[tool.poetry]
name = "nlpdf"
version = "0.1.0"
description = "AI-powered PDF processing using natural language"
authors = ["Lokeshwar Reddy"]
readme = "README.md"
package-mode = false

[tool.poetry.dependencies]
python = "^3.13"
fastapi = "^0.129.0"
uvicorn = {extras = ["standard"], version = "^0.40.0"}
pypdf = "^6.7.0"
python-multipart = "^0.0.22"
pikepdf = "^10.3.0"
slowapi = "^0.1.9"

[tool.poetry.group.dev.dependencies]
ruff = "^0.15.1"
black = "^26.1.0"
bandit = "^1.9.3"
pre-commit = "^4.5.1"
ty = "^0.0.17"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "N", "W"]

[tool.black]
target-version = ["py313"]

[tool.bandit]
exclude_dirs = ["tests"]

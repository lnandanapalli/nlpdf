exclude: '^(migrations/|frontend/)'
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: poetry run ruff check
        language: system
        types: [python]

      - id: black
        name: black
        entry: poetry run black
        language: system
        types: [python]

      - id: ty
        name: ty
        entry: poetry run ty check
        language: system
        types: [python]

      - id: bandit
        name: bandit
        entry: poetry run bandit -c pyproject.toml
        language: system
        types: [python]

      - id: pip-audit
        name: pip-audit
        entry: poetry run pip-audit
        language: system
        files: ^(pyproject\.toml|poetry\.lock)$
        pass_filenames: false

      - id: detect-secrets
        name: detect-secrets
        entry: poetry run detect-secrets-hook --baseline .secrets.baseline
        language: system
        types: [text]
        exclude: ^\.secrets\.baseline$

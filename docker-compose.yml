services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nlpdf_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "NlpdfPass123!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - mssqldata:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'NlpdfPass123!' -Q 'SELECT 1' -No",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mssqldata:

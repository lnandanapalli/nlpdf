services:
  postgres:
    image: postgres:16-alpine
    container_name: nlpdf_postgres
    environment:
      POSTGRES_USER: nlpdf
      POSTGRES_PASSWORD: nlpdf
      POSTGRES_DB: nlpdf_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nlpdf -d nlpdf_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

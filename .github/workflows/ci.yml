name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend (Lint, Security, Tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libglib2.0-dev unixodbc-dev
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-
      - name: Install dependencies
        run: poetry install
      - name: Pre-commit checks
        run: poetry run pre-commit run --all-files
      - name: Run Backend Tests
        run: |
          docker compose up -d sqlserver
          # Wait for SQL Server
          echo "Waiting for SQL Server..."
          until docker exec nlpdf_sqlserver /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'NlpdfPass123!' -Q 'SELECT 1' -No; do
            sleep 5
          done
          poetry run alembic upgrade head
          poetry run pytest tests/ -v --cov=backend --cov-report=term-missing
        env:
          APP_ENV: development
          DB_PASSWORD: NlpdfPass123! # pragma: allowlist secret
          DB_HOST: localhost
          DB_PORT: 1433
          DB_NAME: master
          DB_USER: sa
          DB_DRIVER: ODBC Driver 18 for SQL Server
          HUGGINGFACE_API_TOKEN: mock # pragma: allowlist secret
          JWT_SECRET_KEY: ci-test-secret-key-at-least-32-chars-long # pragma: allowlist secret
          RESEND_API_KEY: mock # pragma: allowlist secret
          CLOUDFLARE_TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA # pragma: allowlist secret

  frontend:
    name: Frontend (Lint & Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  e2e:
    name: Full Stack E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libglib2.0-dev unixodbc-dev
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install Backend Dependencies
        run: poetry install
      
      - name: Start Database (SQL Server)
        run: docker compose up -d sqlserver

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: cd frontend && npm ci
      
      - name: Install Playwright Browsers
        run: cd frontend && npx playwright install chromium --with-deps

      - name: Start Backend Server
        run: | # pragma: allowlist secret
          echo "APP_ENV=development" > .env
          echo "JWT_SECRET_KEY=ci-test-secret-key-at-least-32-chars-long" >> .env # pragma: allowlist secret
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=1433" >> .env
          echo "DB_USER=sa" >> .env
          echo "DB_PASSWORD=NlpdfPass123!" >> .env # pragma: allowlist secret
          echo "DB_NAME=master" >> .env
          echo "DB_DRIVER=ODBC Driver 18 for SQL Server" >> .env
          echo "HUGGINGFACE_API_TOKEN=mock" >> .env
          echo "RESEND_API_KEY=mock" >> .env
          echo "TURNSTILE_SECRET_KEY=1x0000000000000000000000000000000AA" >> .env # pragma: allowlist secret
          echo "CLOUDFLARE_TURNSTILE_SECRET_KEY=1x0000000000000000000000000000000AA" >> .env # pragma: allowlist secret
          
          # Wait for SQL Server to be healthy
          echo "Waiting for SQL Server..."
          until docker exec nlpdf_sqlserver /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'NlpdfPass123!' -Q 'SELECT 1' -No; do
            sleep 5
          done
          
          poetry run alembic upgrade head
          nohup poetry run uvicorn backend.main:app --port 8000 &
          npx wait-on http-get://localhost:8000/health --timeout 60000

      - name: Run Playwright Tests
        run: cd frontend && npm run test:e2e
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          CI: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
